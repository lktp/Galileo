!
hostname router_branch_beta
!
interface GigabitEthernet0/0
 description WAN Link to Core Alpha
 ip address 10.0.12.2 255.255.255.252
 ip access-group BACKBONE_EDGE_FILTER in
!
interface GigabitEthernet0/1.10
 description Corporate LAN Subnet
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
 ip access-group access-list 110 in
!
interface GigabitEthernet0/1.20
 description Guest WiFi Subnet
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
 ip access-group access-list 120 in
!
interface GigabitEthernet0/1.30
 description Server Zone Subnet
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
!
! =========================================================================
! TEST MATRIX A: NAMED EXTENDED ACCESS CONTROL LISTS
! =========================================================================
ip access-list extended BACKBONE_EDGE_FILTER
 permit tcp any 192.168.30.0 0.0.0.255 eq 443
 permit udp any 192.168.30.50 0.0.0.0 eq 53
 deny ip any 192.168.10.0 0.0.0.255
 deny ip any any
!
! =========================================================================
! TEST MATRIX B: CLASSIC NUMBERED EXTENDED ACCESS CONTROL LISTS
! =========================================================================
! Corporate LAN Traffic Mapping
access-list 110 permit ip 192.168.10.0 0.0.0.255 192.168.30.0 0.0.0.255
access-list 110 permit tcp 192.168.10.0 0.0.0.255 any eq www
access-list 110 deny ip 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255
access-list 110 permit ip any any
!
! Guest WiFi Isolation Routing
access-list 120 permit tcp 192.168.20.0 0.0.0.255 any eq 80
access-list 120 permit tcp 192.168.20.0 0.0.0.255 any eq 443
access-list 120 deny ip 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255
access-list 120 deny ip 192.168.20.0 0.0.0.255 192.168.30.0 0.0.0.255
access-list 120 deny ip any any
!
! =========================================================================
! GLOBAL SECURITY COMPLIANCE AUDIT TEST TRIGGERS
! =========================================================================
enable password admin_legacy_cleartext
!
snmp-server community public RO
snmp-server community private RW
!
ip http server
!
line vty 0 4
 transport input telnet ssh
!
end