!
hostname router_core_alpha
!
enable password cisco_cleartext_vulnerable
!
username admin privilege 15 secret SuperSecureSecretPassword123!
!
ip http server
no ip http secure-server
!
interface GigabitEthernet0/0
 description P2P Link to router_branch_beta
 ip address 192.168.254.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Trunk Link to switch_core_layer2
 ip address 10.100.10.1 255.255.255.0
 no shutdown
!
ip access-list extended BACKBONE_PERMIT_ALL
 permit ip any any
!
line vty 0 4
 privilege 15
 login local
 transport input telnet ssh
!
end