!
hostname router_branch_beta
!
! =========================================================================
! ADVANCED OBJECT GROUPS (NETWORK & SERVICE SEGMENTATION)
! =========================================================================
object-group network CORPORATE_MGT_SUBNETS
 192.168.10.0 255.255.255.0
 192.168.11.0 255.255.255.0
!
object-group network CRITICAL_SERVER_FARM
 192.168.30.10 255.255.255.255
 192.168.30.20 255.255.255.255
 192.168.32.0 255.255.255.0
!
object-group network RESTRICTED_GUEST_POOLS
 172.16.50.0 255.255.255.0
 172.16.51.0 255.255.255.0
!
object-group service SECURE_WEB_TRAFFIC tcp
 port eq 443
 port eq 8443
!
! =========================================================================
! INTERFACE CONFIGURATION & ACCESS-GROUP ASSIGNMENTS
! =========================================================================
interface GigabitEthernet0/0
 description MPLS WAN Primary Link to Data Center Alpha
 ip address 10.100.24.2 255.255.255.252
 ip access-group WAN_INGRESS_FILTER in
!
interface GigabitEthernet0/1.10
 description Corporate LAN Gateway
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
 ip access-group access-list 115 in
!
interface GigabitEthernet0/1.20
 description Contractor & Vendor Staging Zone
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
 ip access-group CONTRACTOR_FILTER_IN in
!
interface GigabitEthernet0/1.50
 description Public Guest Wi-Fi (Untrusted)
 encapsulation dot1Q 50
 ip address 172.16.50.1 255.255.255.0
 ip access-group access-list 150 in
!
interface GigabitEthernet0/1.99
 description Native Management VLAN
 encapsulation dot1Q 99
 ip address 10.99.99.1 255.255.255.0
 ip access-group MGMT_PROTECTION_IN in
!
! =========================================================================
! COMPLEX NAMED EXTENDED ACCESS CONTROL LISTS
! =========================================================================
ip access-list extended WAN_INGRESS_FILTER
 remark --- Permit Secure DMZ / Server access from DC Alpha ---
 permit tcp 10.0.0.0 0.255.255.255 object-group CRITICAL_SERVER_FARM object-group SECURE_WEB_TRAFFIC
 permit icmp any 192.168.10.0 0.0.255.255 echo
 permit icmp any 192.168.10.0 0.0.255.255 echo-reply
 remark --- Explicitly block inbound scans dropping to user subnets ---
 deny ip any 192.168.10.0 0.0.0.255
 deny ip any 10.99.99.0 0.0.0.255
 deny ip any any log-input
!
ip access-list extended CONTRACTOR_FILTER_IN
 remark --- Allow Contractors to hit specific staging servers only ---
 permit tcp 192.168.20.0 0.0.0.255 192.168.30.20 0.0.0.0 eq 8080
 permit tcp 192.168.20.0 0.0.0.255 192.168.30.22 0.0.0.0 eq database-open
 remark --- Block contractors from pivoting into Corporate LAN or Management ---
 deny ip 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255
 deny ip 192.168.20.0 0.0.0.255 10.99.99.0 0.0.0.255
 permit ip any any
!
ip access-list extended MGMT_PROTECTION_IN
 remark --- Restrict infrastructure management to designated admin subnets ---
 permit tcp 192.168.10.50 0.0.0.0 10.99.99.0 0.0.0.255 eq ssh
 deny tcp any any eq 22 log
 deny tcp any any eq 23 log
 deny ip any any
!
! =========================================================================
! COMPLEX CLASSIC NUMBERED EXTENDED ACCESS CONTROL LISTS
! =========================================================================
! --- Access List 115: Corporate User Outbound Routing Rules ---
access-list 115 permit tcp 192.168.10.0 0.0.0.255 192.168.30.0 0.0.0.255 eq 443
access-list 115 permit udp 192.168.10.0 0.0.0.255 10.100.1.10 0.0.0.0 eq domain
access-list 115 deny ip 192.168.10.0 0.0.0.255 172.16.50.0 0.0.1.255
access-list 115 permit ip any any
!
! --- Access List 150: Guest Isolation Rules (Internet Only Access) ---
access-list 150 permit udp 172.16.50.0 0.0.1.255 any eq bootps
access-list 150 permit udp 172.16.50.0 0.0.1.255 any eq domain
access-list 150 deny ip 172.16.50.0 0.0.1.255 192.168.0.0 0.0.255.255
access-list 150 deny ip 172.16.50.0 0.0.1.255 10.0.0.0 0.255.255.255
access-list 150 permit tcp 172.16.50.0 0.0.1.255 any eq 80
access-list 172.16.50.0 0.0.1.255 any eq 443
access-list 150 deny ip any any
!
! =========================================================================
! COMPLIANCE AUDIT / MISCONFIGURATION TARGET TRIGGERS
! =========================================================================
enable password unencrypted_fallback_secret
!
snmp-server community public RO
snmp-server community private RW
snmp-server host 192.168.10.99 version 2c public
!
ip http server
ip http timeout-policy idle 600