{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h2 class="mb-4">System Control Dashboard</h2>

    <div class="card mb-4 border-danger">
        <div class="card-header bg-danger text-white">Database Management</div>
        <div class="card-body">
            <p><strong>Warning:</strong> The following actions are irreversible.</p>
            
            <form method="POST">
                {% csrf_token %}
                
                <button type="submit" name="action" value="run_reconciliation" class="btn btn-primary">
                    <i class="bi bi-arrow-repeat"></i> Reconcile Topology Data
                </button>

                <button type="submit" name="action" value="clear_all" 
                        class="btn btn-danger" 
                        onclick="return confirm('Are you sure you want to wipe all network data?')">
                    <i class="bi bi-trash"></i> Factory Reset
                </button>
                                <button type="submit" name="action" value="clear_hosts" 
                        class="btn btn-danger" 
                        onclick="return confirm('Are you sure you want to wipe all network data?')">
                    <i class="bi bi-trash"></i> Wipe All Host Data
                </button>
                                <button type="submit" name="action" value="clear_network" 
                        class="btn btn-danger" 
                        onclick="return confirm('Are you sure you want to wipe your network data?')">
                    <i class="bi bi-trash"></i> Wipe Network Data
                </button>
                                <button type="submit" name="action" value="clear_map" 
                        class="btn btn-danger" 
                        onclick="return confirm('Are you sure you want to wipe all map data?')">
                    <i class="bi bi-trash"></i> Wipe map data
                </button>
            </form>
        </div>
    </div>
    
    {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock %}
