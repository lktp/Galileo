{% extends "base.html" %}

{% load static %} {% block content %}
<div class="container-fluid mt-4">
    <h2>Network Topology Visualization Map</h2>
    <p class="text-muted">Dynamic infrastructure rendering engine synced with device attachment profiles.</p>
    <link href="{% static 'topology/css/vis-network.min.css' %}" rel="stylesheet" type="text/css" />
<script type="text/javascript" src="{% static 'topology/js/vis-network.min.js' %}"></script>
    <div class="card mb-4">
        <div class="card-body bg-light">
            <form method="GET" id="filterForm" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="network_filter" class="col-form-label fw-bold">Select Scope Network:</label>
                </div>
                <div class="col-md-4">
                    <select name="network_filter" id="network_filter" class="form-select" onchange="document.getElementById('filterForm').submit();">
                        <option value="">-- All Discovered Networks --</option>
                        {% for net in networks %}
                            <option value="{{ net.id }}" {% if net.id|slugify == active_filter_id %}selected{% endif %}>
                                {{ net.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div id="network-topology-canvas" style="width: 100%; height: 650px; background-color: #f8f9fa; position: relative;">
                <div id="map-loader" class="position-absolute top-50 start-50 translate-middle text-center">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-2 text-muted fw-bold">Compiling Topology Mappings...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="portScanModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Port Scan Results</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="scan-modal-body">
        <p>Loading scan data...</p>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
window.onload = function() {
    const canvasContainer = document.getElementById('network-topology-canvas');
    const loader = document.getElementById('map-loader');
    
    // Global variable for the network instance
    let networkGraph;
    let originalNodes = null;

    if (typeof vis === 'undefined') {
        console.error("Vis.js failed to load.");
        return;
    }

    const activeFilter = "{{ active_filter_id }}";
    let apiUrl = "/topology/network-graph-json/";
    if (activeFilter) apiUrl += `?network_filter=${activeFilter}`;

    // Helper function for Port Scans - placed globally in scope
    function fetchPortScanData(fullId, id) {
        console.log("DEBUG: Attempting to fetch scan for:", id);
        const modalBody = document.getElementById('scan-modal-body');
        const modalElement = document.getElementById('portScanModal');
        
        if (!modalElement) {
            console.error("Modal element not found in HTML!");
            return;
        }

        const scanModal = new bootstrap.Modal(modalElement);
        modalBody.innerHTML = "Fetching scan data...";
        scanModal.show();
        
        fetch(`/api/scan-info/${id}/`)
            .then(res => res.json())
            .then(data => {
                modalBody.innerHTML = data.ports?.length > 0 
                    ? `<ul class="list-group">${data.ports.map(p => `<li class="list-group-item">Port: ${p}</li>`).join('')}</ul>`
                    : "<p>No open ports detected.</p>";
            })
            .catch(() => modalBody.innerHTML = "<p class='text-danger'>Error loading data.</p>");
    }

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            if (loader) loader.style.display = 'none';
            if (!data.nodes || data.nodes.length === 0) {
                canvasContainer.innerHTML = `<div class="text-center p-5"><h4>⚠️ No Map Assets</h4></div>`;
                return;
            }

            const nodes = new vis.DataSet(data.nodes);
            const edges = new vis.DataSet(data.edges);
            const graphData = { nodes: nodes, edges: edges };

            const options = {
                // 1. Use a faster solver for larger datasets
                physics: {
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: {
                        gravitationalConstant: -5000,
                        centralGravity: 0.01,
                        springConstant: 0.08,
                        springLength: 100,
                        damping: 0.4,
                        avoidOverlap: 1 // High value prevents bunching
                    },
                    // 2. Limit the stabilization effort
                    stabilization: {
                        enabled: true,
                        iterations: 100, // Stop calculating after 100 iterations
                        updateInterval: 25,
                        onlyDynamicEdges: false,
                        fit: true
                    }
                },
                nodes: {
                    shape: 'dot',
                    size: 24,
                    font: { face: 'monospace' }
                },
                groups: {
                    switch: { color: { background: '#0d6efd' }, shape: 'square' },
                    endpoint: { color: { background: '#198754' }, shape: 'dot' }
                }
            };

            networkGraph = new vis.Network(canvasContainer, graphData, options);

            // RIGHT-CLICK: Direct Event Listener on Canvas
            canvasContainer.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                const nodeID = networkGraph.getNodeAt({x: e.offsetX, y: e.offsetY});
                if (nodeID) {
                    const cleanId = nodeID.split('_')[1];
                    fetchPortScanData(nodeID, cleanId);
                }
            });

            // LEFT-CLICK: Reachability
            networkGraph.on("selectNode", function (params) {
                const selectedId = params.nodes[0];
                if (!selectedId.startsWith("host_")) return;

                const dbHostId = selectedId.split("_")[1];
                if (!originalNodes) originalNodes = JSON.parse(JSON.stringify(data.nodes));

                fetch(`/topology/api/reachability/${dbHostId}/`)
                    .then(res => res.json())
                    .then(matrix => {
                        const updatedNodes = data.nodes.map(node => {
                            if (node.id === matrix.source_id) return { ...node, color: { background: '#0dcaf0' }, chosen: false };
                            if (matrix.blocked.includes(node.id)) return { ...node, color: { background: '#dc3545' }, chosen: false };
                            return { ...node, chosen: false };
                        });
                        nodes.update(updatedNodes);
                    });
            });

            networkGraph.on("deselectNode", function () {
                if (originalNodes) nodes.update(originalNodes);
            });
        })
        .catch(err => console.error("Mapping Error:", err));
};
</script>
{% endblock %}
